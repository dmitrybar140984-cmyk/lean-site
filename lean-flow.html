<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lean Flow — Симулятор БПЛА «Герань» | LeanPro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1a6b3c;--gd:#134d2c;--gl:#e8f5ee;--gm:#d4eedf;
  --red:#e53935;--rdl:#ffebee;--rdm:#ffcdd2;
  --blue:#1976d2;--bl:#e3f2fd;
  --yellow:#f5a623;--yl:#fff8e1;
  --text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
  --bg:#f8faf9;--white:#fff;
  --r:12px;--sh:0 4px 24px rgba(0,0,0,.09);--shl:0 12px 48px rgba(0,0,0,.13);
  --t:.22s ease;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
.lf-header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.lf-hinner{max-width:1100px;margin:0 auto;padding:0 20px;height:68px;display:flex;align-items:center;gap:20px}
.lf-logo{font-size:20px;font-weight:800;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px;flex-shrink:0}
.lf-logo span{color:var(--g)}
.lf-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text)}
.lf-back{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:8px;border:1px solid var(--border);transition:var(--t)}
.lf-back:hover{color:var(--g);border-color:var(--g);background:var(--gl)}
.phase-bar{display:flex;gap:0;flex:1;justify-content:center}
.phase-dot{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#aaa}
.phase-dot .pd-c{width:28px;height:28px;border-radius:50%;border:2px solid #e5e7eb;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:var(--t)}
.phase-dot.done .pd-c{background:var(--g);border-color:var(--g);color:#fff}
.phase-dot.active .pd-c{border-color:var(--g);color:var(--g);box-shadow:0 0 0 3px rgba(26,107,60,.18)}
.phase-dot .pd-line{width:24px;height:2px;background:#e5e7eb;margin:0 2px}
.phase-dot.done .pd-line{background:var(--g)}

/* MAIN */
.lf-main{max-width:1100px;margin:0 auto;padding:28px 16px 80px}

/* TABS */
.tab-bar{display:flex;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.tabBtn{background:var(--white);border:2px solid var(--border);border-radius:8px;padding:9px 20px;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:var(--t)}
.tabBtn:hover,.tabBtn.active{background:var(--g);border-color:var(--g);color:#fff}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:var(--sh)}
.card-green{border-color:var(--g);border-width:2px;background:linear-gradient(135deg,#fff,#f0faf5)}
.card-red{border-color:var(--red);border-width:2px;background:linear-gradient(135deg,#fff,#fff5f5)}
.card-blue{border-color:var(--blue);border-width:2px;background:linear-gradient(135deg,#fff,#f0f6ff)}
.card-yellow{border-color:var(--yellow);border-width:2px;background:linear-gradient(135deg,#fff,#fffbf0)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-weight:700;font-size:15px;border-radius:10px;border:none;cursor:pointer;padding:13px 28px;transition:var(--t);text-decoration:none;white-space:nowrap}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--gd);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,107,60,.3)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#c62828}
.btn-outline{background:transparent;border:2px solid var(--g);color:var(--g)}.btn-outline:hover{background:var(--gl)}
.btn-lg{padding:16px 36px;font-size:17px}
.btn-full{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* THEORY SECTION */
.theory-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:700px){.theory-grid{grid-template-columns:1fr}}
.theory-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:var(--t)}
.theory-card:hover{box-shadow:var(--sh);border-color:var(--g)}
.theory-card .tc-icon{font-size:40px;margin-bottom:12px}
.theory-card h3{font-size:17px;font-weight:800;margin-bottom:10px}
.theory-card p{font-size:14px;color:var(--muted);line-height:1.65}
.theory-card .tc-tag{display:inline-block;background:var(--gl);color:var(--g);font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:10px}
.push-pull{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.flow-box{border-radius:10px;padding:14px;font-size:13px}
.flow-push{background:#fff5f5;border:1px solid var(--rdm)}
.flow-pull{background:var(--gl);border:1px solid var(--gm)}
.flow-box strong{display:block;font-size:15px;margin-bottom:6px}
.flow-box ul{list-style:none;display:flex;flex-direction:column;gap:3px}
.flow-box ul li::before{margin-right:5px}
.flow-push ul li::before{content:'✗';color:var(--red)}
.flow-pull ul li::before{content:'✓';color:var(--g)}

/* FLOW ARROWS (push vs pull diagram) */
.flow-diagram{display:flex;align-items:center;gap:0;margin:16px 0;overflow-x:auto;padding:8px 0}
.fd-node{background:var(--white);border:2px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;font-weight:700;text-align:center;white-space:nowrap;flex-shrink:0;min-width:80px}
.fd-node.blue{border-color:var(--blue);background:var(--bl)}
.fd-node.green{border-color:var(--g);background:var(--gl)}
.fd-node.red{border-color:var(--red);background:var(--rdl)}
.fd-arr{font-size:20px;color:#aaa;padding:0 4px;flex-shrink:0}
.fd-arr.push-arr{color:var(--blue)}
.fd-arr.pull-arr{color:var(--g)}
.fd-wip{background:#fff3cd;border:1px solid #ffd54f;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;color:#795548;white-space:nowrap;margin:0 2px;flex-shrink:0}

/* CODP TIMELINE */
.codp-line{position:relative;margin:24px 0;padding:20px 0}
.codp-ops{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center}
.codp-op{border-radius:8px;padding:10px 12px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;border:2px solid transparent;transition:var(--t);user-select:none;min-width:80px}
.codp-op.stock{background:#e3f2fd;color:var(--blue);border-color:#90caf9}
.codp-op.order{background:var(--gl);color:var(--g);border-color:var(--gm)}
.codp-op.variant{background:var(--yl);color:#795548;border-color:#ffe082}
.codp-marker{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;margin:0 4px;cursor:pointer;white-space:nowrap;transition:var(--t)}
.codp-marker:hover{background:#b71c1c}
.codp-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px;font-weight:600}

/* ===== FACTORY FLOOR ===== */
.factory-wrap{background:linear-gradient(160deg,#eceff1 0%,#e0e5e2 100%);border-radius:16px;border:2px solid #cfd8dc;padding:20px;overflow-x:auto;margin-bottom:20px;min-height:220px;position:relative}
.factory-label{font-size:11px;font-weight:700;color:#90a4ae;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.factory-line{display:flex;align-items:flex-end;gap:0;min-width:max-content}

/* Raw material */
.raw-mat{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 12px}
.raw-mat .rm-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.raw-mat .rm-stack{display:flex;flex-direction:column;align-items:center;gap:2px;min-height:80px;justify-content:flex-end}
.raw-unit{font-size:18px;animation:dropIn .3s}

/* Connector arrows */
.conn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 4px}
.conn-arr{font-size:18px;color:#aaa}
.wip-badge{background:#e53935;color:#fff;font-size:11px;font-weight:800;border-radius:10px;padding:2px 8px;min-width:26px;text-align:center;transition:var(--t)}
.wip-badge.zero{background:#e5e7eb;color:#aaa}
.wip-badge.warn{background:#ff9800}
.wip-badge.high{background:var(--red);animation:wiggle .5s infinite alternate}
.wip-stack-icons{display:flex;flex-direction:column;align-items:center;gap:1px;min-height:40px;justify-content:flex-end}
.wip-icon{font-size:14px}

/* Station box */
.station{display:flex;flex-direction:column;align-items:center;background:var(--white);border:2px solid var(--border);border-radius:10px;padding:12px 10px;min-width:100px;max-width:110px;position:relative;transition:var(--t)}
.station.active{border-color:var(--g);box-shadow:0 0 0 3px rgba(26,107,60,.15)}
.station.bottleneck{border-color:var(--red);box-shadow:0 0 0 3px rgba(229,57,53,.15)}
.station.idle{opacity:.6;border-style:dashed}
.station.injured{border-color:var(--yellow);background:#fffde7}
.station .st-icon{font-size:28px;margin-bottom:4px}
.station .st-worker{font-size:22px}
.station .st-name{font-size:11px;font-weight:700;text-align:center;line-height:1.3;margin-bottom:6px;color:var(--text)}
.station .st-time{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;margin-top:4px}
.station .st-time.ok{background:var(--gl);color:var(--g)}
.station .st-time.over{background:var(--rdl);color:var(--red)}
.station .st-time.warn{background:var(--yl);color:#795548}
.station .st-alert{position:absolute;top:-10px;right:-10px;font-size:18px;animation:pulse 1s infinite}
.station .st-processing{position:absolute;bottom:-10px;font-size:16px;animation:spin 1s linear infinite}
.station .st-tag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;white-space:nowrap}
.station .st-tag.green{background:var(--g)}
.station .st-tag.red{background:var(--red)}

/* Output done */
.done-box{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 12px}
.done-count{font-size:36px;font-weight:800;color:var(--g);line-height:1}
.done-label{font-size:11px;font-weight:600;color:var(--muted)}
.done-units{display:flex;flex-wrap:wrap;gap:2px;max-width:80px;justify-content:center;min-height:40px;align-items:center}
.done-unit{font-size:16px;animation:popIn .3s}

/* Pull kanban signals */
.kanban-row{display:flex;align-items:center;gap:0;min-width:max-content;margin-top:8px}
.kb-signal{background:var(--yl);border:1px solid #ffd54f;border-radius:4px;font-size:10px;font-weight:700;color:#795548;padding:2px 6px;white-space:nowrap;opacity:0;transition:opacity .3s}
.kb-signal.visible{opacity:1}
.kb-arr{font-size:14px;color:var(--yellow);padding:0 2px}

/* SIMULATION CONTROLS */
.sim-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.sim-speed{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.sim-timer{font-size:28px;font-weight:800;color:var(--g);font-variant-numeric:tabular-nums;min-width:80px}
.sim-demand-bar{flex:1;min-width:200px}
.sim-demand-bar .db-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar{height:18px;background:#e5e7eb;border-radius:9px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:9px;transition:width .5s}
.progress-fill.green{background:var(--g)}
.progress-fill.yellow{background:#f5a623}
.progress-fill.red{background:var(--red)}
.progress-target{position:absolute;top:0;bottom:0;width:2px;background:#1a1a2e;opacity:.4}

/* METRICS ROW */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.metrics-row{grid-template-columns:1fr 1fr}}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.metric-card .mc-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.metric-card .mc-label{font-size:12px;color:var(--muted);font-weight:600}
.metric-card.good .mc-val{color:var(--g)}
.metric-card.bad .mc-val{color:var(--red)}
.metric-card.warn .mc-val{color:var(--yellow)}
.metric-card.neutral .mc-val{color:var(--blue)}

/* EVENT LOG */
.event-log{background:#1a1a2e;border-radius:10px;padding:16px;max-height:140px;overflow-y:auto;font-size:13px;font-family:monospace;line-height:1.7}
.ev-line{color:#aaa}
.ev-line.ev-ok{color:#4caf50}
.ev-line.ev-err{color:#ef5350}
.ev-line.ev-warn{color:#ffa726}
.ev-line.ev-info{color:#42a5f5}

/* LADM TABLE */
.ladm{width:100%;border-collapse:collapse;margin:16px 0}
.ladm th{background:var(--gl);color:var(--g);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;text-align:left;border:1px solid var(--gm)}
.ladm td{padding:10px 12px;border:1px solid var(--border);font-size:14px;vertical-align:middle}
.ladm tr:hover td{background:var(--bg)}
.ladm tr.bottleneck td{background:#fff5f5}
.time-bar{height:20px;border-radius:4px;position:relative;background:#e5e7eb;min-width:60px;overflow:visible}
.time-bar-va{height:100%;border-radius:4px;background:var(--g);display:inline-block;vertical-align:top;transition:width .5s}
.time-bar-waste{height:100%;border-radius:0 4px 4px 0;background:#ef9a9a;display:inline-block;vertical-align:top;transition:width .5s}
.time-bar-takt{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--red);z-index:2}
.time-bar-takt::before{content:'Такт';position:absolute;top:-18px;left:2px;font-size:9px;color:var(--red);font-weight:800;white-space:nowrap}
.worker-assign{display:flex;flex-wrap:wrap;gap:4px}
.wk-chip{background:var(--gl);color:var(--g);border:1px solid var(--gm);border-radius:6px;font-size:11px;font-weight:700;padding:3px 10px;cursor:pointer;transition:var(--t)}
.wk-chip:hover{background:var(--gm)}
.wk-chip.sel{background:var(--g);color:#fff;border-color:var(--gd)}

/* WORKER BINS for LADM assignment */
.worker-bins{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
@media(max-width:600px){.worker-bins{grid-template-columns:1fr}}
.worker-bin{background:var(--white);border:2px dashed var(--border);border-radius:10px;padding:16px;min-height:100px;transition:var(--t)}
.worker-bin.balanced{border-color:var(--g);background:var(--gl)}
.worker-bin.over{border-color:var(--red);background:var(--rdl)}
.wb-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:700;font-size:14px}
.wb-ops{display:flex;flex-wrap:wrap;gap:6px;min-height:40px;margin-bottom:10px}
.wb-op{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:4px}
.wb-op:hover{border-color:var(--red);background:var(--rdl)}
.wb-time-bar{height:12px;border-radius:6px;background:#e5e7eb;overflow:hidden;position:relative}
.wb-time-fill{height:100%;border-radius:6px;transition:width .4s}

/* ENTRY POINT SELECTOR */
.ep-timeline{display:flex;align-items:center;gap:4px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.ep-op{border-radius:8px;padding:10px 12px;font-size:12px;font-weight:700;text-align:center;min-width:85px;border:2px solid transparent;cursor:pointer;transition:var(--t);flex-shrink:0}
.ep-op.forecast{background:#e3f2fd;color:var(--blue);border-color:#90caf9}
.ep-op.made-to-order{background:var(--gl);color:var(--g);border-color:var(--gm)}
.ep-op.variant{background:var(--yl);color:#795548;border-color:#ffe082}
.ep-op:hover{transform:scale(1.05)}
.ep-cut{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:0 4px;flex-shrink:0}
.ep-cut .cut-line{width:3px;height:40px;background:#aaa;border-radius:2px;transition:var(--t)}
.ep-cut .cut-label{font-size:10px;color:#aaa;font-weight:700;white-space:nowrap;transition:var(--t)}
.ep-cut.selected .cut-line{background:var(--red)}
.ep-cut.selected .cut-label{color:var(--red)}
.ep-cut:hover .cut-line{background:var(--yellow)}
.ep-cut:hover .cut-label{color:var(--yellow)}
.ep-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;font-weight:600;margin-top:12px;justify-content:center}
.ep-legend span{display:flex;align-items:center;gap:4px}
.ep-legend .dot{width:12px;height:12px;border-radius:3px}

/* COMPARISON TABLE */
.compare-table{width:100%;border-collapse:collapse;margin:16px 0}
.compare-table th{background:#1a1a2e;color:#fff;padding:12px 16px;font-size:13px;font-weight:700;text-align:left}
.compare-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.compare-table tr:nth-child(even) td{background:var(--bg)}
.compare-table .r1{color:var(--red);font-weight:700}
.compare-table .r2{color:var(--yellow);font-weight:700}
.compare-table .r3{color:var(--g);font-weight:700}
.trend-up{color:var(--g)}
.trend-down{color:var(--red)}

/* SECTION TITLES */
.phase-title{font-size:26px;font-weight:800;margin-bottom:8px}
.phase-sub{font-size:16px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.section-h{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.tag-pill{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.tag-green{background:var(--gl);color:var(--g)}
.tag-red{background:var(--rdl);color:var(--red)}
.tag-yellow{background:var(--yl);color:#795548}
.tag-blue{background:var(--bl);color:var(--blue)}

/* CERTIFICATE */
.cert-wrap{background:var(--white);border:3px solid var(--g);border-radius:20px;padding:40px;text-align:center;max-width:600px;margin:0 auto 32px}
.cert-icon{font-size:72px;margin-bottom:12px}
.cert-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
.cert-kpi{background:var(--gl);border-radius:10px;padding:14px 8px}
.cert-kpi strong{display:block;font-size:26px;font-weight:800;color:var(--g)}
.cert-kpi span{font-size:11px;color:var(--muted);font-weight:600}

/* HIGHLIGHT BOX */
.insight-box{border-left:4px solid var(--g);background:var(--gl);border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:14px;line-height:1.65;color:var(--gd)}
.insight-box.red{border-color:var(--red);background:var(--rdl);color:#b71c1c}
.insight-box.yellow{border-color:var(--yellow);background:var(--yl);color:#5d4037}
.insight-box.blue{border-color:var(--blue);background:var(--bl);color:#0d47a1}
.insight-box strong{font-size:15px}

/* VARIANT BADGES */
.variant-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;border:2px solid transparent}
.var-1{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.var-2{background:#efebe9;color:#4e342e;border-color:#bcaaa4}
.var-3{background:#f3e5f5;color:#4a148c;border-color:#ce93d8}

/* ANIMATIONS */
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes dropIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes wiggle{from{transform:rotate(-3deg)}to{transform:rotate(3deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes droneMove{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes flashOk{0%,100%{background:var(--white)}50%{background:#d4edda;border-color:var(--g)}}
@keyframes flashErr{0%,100%{background:var(--white)}50%{background:#ffd6d6;border-color:var(--red)}}

.anim-slide{animation:slideIn .4s ease}

/* FEEDBACK */

function renderFactory(opts={}){
  const {fiveS=false, pull=false, workers=8, entryPoint=null, highlightBottleneck=false,
         showKanban=false, round=1} = opts;
  const bottleneckId = 2; // Op 2 (Wings) is always bottleneck in R1/R2

  // Compute effective op times
  const opTimes = OPS.map(o => fiveS ? o.time : o.time+o.waste);
  const takt = ROUNDS[round] ? ROUNDS[round].takt : 360;

  let html = `<div class="factory-wrap">`;
  html += `<div class="factory-label">
    🏭 Производственная линия — ${fiveS?'✅ 5S выполнен':'❌ 5S не сделан'} &nbsp;|&nbsp;
    ${pull?'🟢 PULL-поток':'🔴 PUSH-поток'} &nbsp;|&nbsp;
    👷 ${workers} рабочих &nbsp;|&nbsp; ⏱ Такт: ${takt}с
  </div>`;

  html += `<div class="factory-line" id="factoryLine">`;

  // Raw material
  html += `<div class="raw-mat">
    <div class="rm-stack">
      ${Array(fiveS?3:8).fill().map(()=>`<div class="raw-unit">📦</div>`).join('')}
    </div>
    <div class="rm-label">Сырьё</div>
  </div>`;

  OPS.forEach((op,i)=>{
    const t = opTimes[i];
    const isBottleneck = highlightBottleneck && op.id===bottleneckId;
    const isVariant = op.variant;
    const isEntryPoint = entryPoint && op.id===entryPoint;
    const timeClass = t>takt?'over':t>takt*0.85?'warn':'ok';
    const wipCount = S.wip[i] || 0;
    const wipClass = wipCount===0?'zero':wipCount>=5?'high':wipCount>=3?'warn':'';

    // Connector with WIP
    html += `<div class="conn">
      <div class="wip-stack-icons">${Array(Math.min(wipCount,5)).fill().map(()=>`<div class="wip-icon">🚁</div>`).join('')}</div>
      <div class="wip-badge ${wipClass}" id="wip${i}">${wipCount}</div>
      <div class="conn-arr">${pull?'🔄':'→'}</div>
    </div>`;

    // Station
    const workerEmoji = S.injured > 0 && op.id===bottleneckId && round===1 ? '🤕' : '👷';
    html += `<div class="station ${isBottleneck?'bottleneck':''} ${fiveS&&!isBottleneck?'active':''}" id="st${op.id}">
      ${isBottleneck&&highlightBottleneck?`<div class="st-tag red">⚠️ Узкое место</div>`:''}
      ${isVariant?`<div class="st-tag green">Дифференциация</div>`:''}
      ${isEntryPoint?`<div class="st-tag" style="background:var(--red)">◄ CODP</div>`:''}
      <div class="st-icon">${op.icon}</div>
      <div class="st-worker">${workerEmoji}</div>
      <div class="st-name">${op.short}</div>
      <div class="st-time ${timeClass}">${t}с${!fiveS&&op.waste>0?`<span style="color:#ef9a9a;font-size:10px"> +${op.waste}с🗑️</span>`:''}</div>
    </div>`;
  });

  // Output
  html += `<div class="conn"><div class="conn-arr">→</div></div>`;
  html += `<div class="done-box">
    <div class="done-count" id="doneCount">${S.done}</div>
    <div class="done-label">Выпущено</div>
    <div class="done-units" id="doneUnits">${Array(Math.min(S.done,8)).fill().map(()=>`<div class="done-unit">🚁</div>`).join('')}</div>
  </div>`;

  html += `</div>`; // factory-line

  // Pull kanban row
  if(showKanban){
    html += `<div class="kanban-row" id="kanbanRow" style="margin-top:12px;justify-content:center;flex-wrap:wrap;gap:4px">`;
    OPS.forEach((op,i)=>{
      if(i<OPS.length-1){
        const vis = S.kanbanActive.includes(op.id);
        html += `<span class="kb-signal ${vis?'visible':''}" id="kb${op.id}">📋 К${op.id+1}</span>`;
        html += `<span class="kb-arr">←</span>`;
      }
    });
    html += `</div>`;
  }

  html += `</div>`; // factory-wrap
  return html;
}

function runSim(round, opts, onDone){
  const events = SIM_EVENTS[round] || [];
  S.simRunning = true;
  S.simT = 0;
  S.wip = [0,0,0,0,0,0,0,0];
  S.done = 0;
  S.injured = 0;
  S.log = [];
  S.kanbanActive = [];

  refreshFactory(opts);

  S.simTimer = setInterval(()=>{
    S.simT++;

    // Fire events for this tick
    events.filter(e=>e.t===S.simT).forEach(ev=>{
      if(ev.type==='log'){
        S.log.push({msg:ev.msg, cls:ev.cls||'ev-info'});
        updateLog();
      }
      if(ev.type==='wip'){
        S.wip[ev.station-1] = ev.val;
        refreshWIP();
      }
      if(ev.type==='complete'){
        S.done = ev.val;
        refreshDone();
      }
      if(ev.type==='injury'){
        S.injured++;
        showToast(ev.msg,'err');
        const st = document.getElementById(`st${ev.station}`);
        if(st){ st.classList.add('injured'); setTimeout(()=>st.classList.remove('injured'),3000); }
      }
      if(ev.type==='kanban'){
        S.kanbanActive.push(ev.from);
        const kb = document.getElementById(`kb${ev.from}`);
        if(kb){ kb.classList.add('visible'); setTimeout(()=>{kb.classList.remove('visible'); S.kanbanActive=S.kanbanActive.filter(x=>x!==ev.from);},2000); }
      }
    });

    // Update timer display
    const factoryMin = Math.round(S.simT * 4);
    const td = document.getElementById('simClock');
    if(td) td.textContent = `${factoryMin} мин`;

    // Progress bar
    const pf = document.getElementById('simProgress');
    if(pf){ pf.style.width = (S.simT/15*100)+'%'; }

    if(S.simT >= 15){
      clearInterval(S.simTimer);
      S.simRunning = false;
      S.done = ROUNDS[round].produced;
      S.wip[1] = ROUNDS[round].wip;
      refreshDone();
      refreshWIP();
      setTimeout(()=>onDone(), 800);
    }
  }, 1000);
}

function refreshWIP(){
  S.wip.forEach((v,i)=>{
    const el = document.getElementById(`wip${i}`);
    if(el){
      el.textContent = v;
      el.className = `wip-badge ${v===0?'zero':v>=5?'high':v>=3?'warn':''}`;
    }
  });
}
function refreshDone(){
  const dc = document.getElementById('doneCount');
  if(dc) dc.textContent = S.done;
  const du = document.getElementById('doneUnits');
  if(du) du.innerHTML = Array(Math.min(S.done,12)).fill().map(()=>`<div class="done-unit">🚁</div>`).join('');
}
function refreshFactory(opts){
  const fl = document.getElementById('factoryArea');
  if(fl) fl.innerHTML = renderFactory(opts);
}
function updateLog(){
  const el = document.getElementById('eventLog');
  if(el) el.innerHTML = S.log.map(l=>`<div class="ev-line ${l.cls}">${l.msg}</div>`).join('');
  if(el) el.scrollTop = el.scrollHeight;
}

function renderLADMPreview(takt){
  const maxT = Math.max(...OPS.map(o=>o.time)) + 20;
  return `<div style="overflow-x:auto"><table class="ladm">
    <tr><th>Операция</th><th>Время ВА (с)</th><th>Потери R1 (с)</th><th style="min-width:180px">График vs Такт (${takt}с)</th></tr>
    ${OPS.map(op=>{
      const vaW = Math.min(op.time/takt*100, 100);
      const wasteW = Math.min(op.waste/takt*100, 100-vaW);
      const taktPos = Math.min(100, 100);
      const over = op.time > takt;
      return `<tr class="${op.time===90?'bottleneck':''}">
        <td><span style="font-size:16px">${op.icon}</span> ${op.name}</td>
        <td><strong>${op.time}с</strong></td>
        <td style="color:#ef9a9a">-${op.waste}с</td>
        <td>
          <div class="time-bar" style="width:100%;position:relative">
            <div class="time-bar-va" style="width:${vaW}%"></div>
            <div class="time-bar-takt" style="left:100%"></div>
          </div>
          ${over?`<span style="font-size:11px;color:var(--red)">⚠️ превышает такт!</span>`:''}
        </td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

function toggleFiveS(id, correct){
  if(correct) S.fiveSSelected.add(id);
  else S.fiveSSelected.delete(id);
}

function checkFiveS(){
  const checkboxes = FIVES_ACTIONS.map(a=>({...a, checked:document.getElementById(a.id)?.checked}));
  let score = 0;
  let feedback = [];
  checkboxes.forEach(a=>{
    if(a.checked && a.correct){ score+=a.points; document.getElementById(`label-${a.id}`).style.borderColor='var(--g)'; document.getElementById(`label-${a.id}`).style.background='var(--gl)'; }
    else if(a.checked && !a.correct){ score+=a.points; document.getElementById(`label-${a.id}`).style.borderColor='var(--red)'; document.getElementById(`label-${a.id}`).style.background='var(--rdl)'; feedback.push(a.text); }
    else if(!a.checked && a.correct){ document.getElementById(`label-${a.id}`).style.borderColor='var(--yellow)'; }
  });
  score = Math.max(0, score);
  S.scores.imp1 = score;
  document.getElementById('fiveSResult').innerHTML = score>=70
    ? `<div class="insight-box">✅ <strong>Отлично! ${score}/100 баллов.</strong> 5S внедрён. Время потерь устранено. Травмы исключены.</div>`
    : `<div class="insight-box yellow">⚠️ ${score} баллов. Некоторые правильные мероприятия пропущены. Попробуй ещё раз.</div>`;

  if(score >= 50){
    document.getElementById('ctSection').style.display='block';
    document.getElementById('ctSection').scrollIntoView({behavior:'smooth'});
  }
}

function checkCT(){
  const val = parseInt(document.getElementById('ctInput').value);
  const check = document.getElementById('ctCheck');
  const result = document.getElementById('ctResult');
  if(val >= 224 && val <= 226){
    check.textContent = '✅';
    result.innerHTML = `<span style="color:var(--g);font-weight:700">Верно! ТТ = 225 с/ед.</span> Это значит: каждые 225 секунд должен выходить один БПЛА.`;
    document.getElementById('ladmPreview').style.display='block';
    S.scores.imp1 = Math.max(S.scores.imp1, 80);
  } else if(val){
    check.textContent = '❌';
    result.innerHTML = `<span style="color:var(--red)">Не совсем. Подсказка: 3600 ÷ 16 = ?</span>`;
  }
}

function renderLADMFull(){
  const takt = 164;
  const maxT = Math.max(...OPS.map(o=>o.time));
  return `<div style="overflow-x:auto"><table class="ladm">
    <tr><th>Операция</th><th>ВА (с)</th><th style="min-width:200px">vs Такт 164с</th><th>Назначить рабочему</th></tr>
    ${OPS.map(op=>{
      const pct = Math.min(op.time/takt*100, 110);
      const over = op.time > takt;
      // Find which worker has this op
      const assigned = Object.entries(S.workerOps).find(([,ops])=>ops.includes(op.id));
      const assignedWorker = assigned ? assigned[0] : null;
      return `<tr id="ladm-row-${op.id}">
        <td><span style="font-size:16px">${op.icon}</span> ${op.name}${op.variant?` <span class="tag-pill tag-yellow" style="font-size:10px;padding:2px 8px">Дифференциация</span>`:''}</td>
        <td><strong>${op.time}с</strong></td>
        <td>
          <div class="time-bar" style="width:100%">
            <div class="time-bar-va" style="width:${Math.min(pct,100)}%;background:${over?'var(--red)':'var(--g)'}"></div>
            <div class="time-bar-takt" style="left:100%"></div>
          </div>
        </td>
        <td>
          <div class="worker-assign">
            ${[1,2,3,4].map(w=>`<span class="wk-chip ${assignedWorker==w?'sel':''}" onclick="assignOp(${op.id},${w})" id="wkc-${op.id}-${w}">👷${w}</span>`).join('')}
          </div>
        </td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

function renderWorkerBins(){
  const takt = 164;
  return [1,2,3,4].map(w=>{
    const ops = S.workerOps[w] || [];
    const total = ops.reduce((a,id)=>a+(OPS.find(o=>o.id===id)?.time||0),0);
    const pct = Math.min(total/takt*100,110);
    const balanced = total <= takt && total >= takt*0.5;
    const over = total > takt;
    return `<div class="worker-bin ${over?'over':balanced?'balanced':''}" id="wbin-${w}">
      <div class="wb-header">👷 Рабочий ${w}
        <span style="font-size:13px;font-weight:700;color:${over?'var(--red)':balanced?'var(--g)':'var(--muted)'}">${total}с / ${takt}с</span>
      </div>
      <div class="wb-ops">
        ${ops.map(id=>{
          const op=OPS.find(o=>o.id===id);
          return op?`<span class="wb-op" title="Нажми чтобы убрать" onclick="unassignOp(${id},${w})">${op.icon} ${op.short} <small>${op.time}с</small></span>`:''
        }).join('')}
        ${ops.length===0?`<span style="color:#aaa;font-size:13px">Назначь операции из таблицы выше</span>`:''}
      </div>
      <div class="wb-time-bar">
        <div class="wb-time-fill" style="width:${Math.min(pct,100)}%;background:${over?'var(--red)':balanced?'var(--g)':'var(--yellow)'}"></div>
      </div>
    </div>`;
  }).join('');
}

function assignOp(opId, worker){
  // Remove from any current worker
  [1,2,3,4].forEach(w=>{ S.workerOps[w] = (S.workerOps[w]||[]).filter(id=>id!==opId); });
  // Assign to new worker
  if(!S.workerOps[worker]) S.workerOps[worker]=[];
  S.workerOps[worker].push(opId);
  // Re-render LADM chips
  OPS.forEach(op=>{
    [1,2,3,4].forEach(w=>{
      const chip = document.getElementById(`wkc-${op.id}-${w}`);
      if(chip) chip.className = `wk-chip ${(S.workerOps[w]||[]).includes(op.id)?'sel':''}`;
    });
  });
  // Re-render bins
  document.getElementById('workerBins').innerHTML = renderWorkerBins();
  checkBalance();
}

function unassignOp(opId, worker){
  S.workerOps[worker] = (S.workerOps[worker]||[]).filter(id=>id!==opId);
  [1,2,3,4].forEach(w=>{
    const chip = document.getElementById(`wkc-${opId}-${w}`);
    if(chip) chip.className = `wk-chip`;
  });
  document.getElementById('workerBins').innerHTML = renderWorkerBins();
  checkBalance();
}

function checkBalance(){
  const takt = 164;
  const allAssigned = OPS.every(op=>[1,2,3,4].some(w=>(S.workerOps[w]||[]).includes(op.id)));
  if(!allAssigned){ document.getElementById('balanceResult').innerHTML=''; return; }

  const workerTotals = [1,2,3,4].map(w=>({w, total:(S.workerOps[w]||[]).reduce((a,id)=>a+(OPS.find(o=>o.id===id)?.time||0),0)}));
  const overloaded = workerTotals.filter(wt=>wt.total>takt);
  const maxTotal = Math.max(...workerTotals.map(w=>w.total));
  const efficiency = Math.round(TOTAL_VA / (4*maxTotal)*100);

  if(overloaded.length > 0){
    document.getElementById('balanceResult').innerHTML = `<div class="insight-box red">❌ Рабочий ${overloaded.map(w=>`#${w.w} (${w.total}с)`).join(', ')} превышает такт (${takt}с). Перераспредели операции.</div>`;
    return;
  }

  S.scores.imp2 = efficiency;
  document.getElementById('balanceResult').innerHTML = `
    <div class="insight-box">✅ <strong>Линия сбалансирована!</strong> КПД балансировки: ${efficiency}% (ВА время = ${TOTAL_VA}с / 4 рабочих × макс.${maxTotal}с)
      <br>Рабочий с максимальной нагрузкой: ${maxTotal}с (задаёт ритм линии)
    </div>`;
  document.getElementById('epSection').style.display = 'block';
  document.getElementById('epSection').scrollIntoView({behavior:'smooth'});
}

function renderEPTimeline(){
  let html = '';
  OPS.forEach((op,i)=>{
    const isSelected = S.entryPoint === op.id;
    const isBefore = S.entryPoint && op.id < S.entryPoint;
    html += `<div class="ep-op ${isBefore?'forecast':op.variant?'variant':'made-to-order'}" onclick="setEntryOp(${op.id})">${op.icon}<br>${op.short}</div>`;
    if(i < OPS.length-1){
      html += `<div class="ep-cut ${isSelected?'selected':''}" onclick="setEntry(${op.id})" id="cut-${op.id}">
        <div class="cut-line"></div>
        <div class="cut-label">${isSelected?'◄ CODP':'|'}</div>
      </div>`;
    }
  });
  return html;
}

function setEntry(afterOpId){
  S.entryPoint = afterOpId+1;
  document.getElementById('epTimeline').innerHTML = renderEPTimeline();
  evaluateEntryPoint();

function setEntryOp(opId){

function evaluateEntryPoint(){
  const ep = S.entryPoint;
  const result = document.getElementById('epResult');
  if(ep === 7){
    result.innerHTML = `<div class="insight-box">✅ <strong>Отлично! CODP = перед Окраской (Оп 7)</strong><br>
      <strong>Логика:</strong> Операции 1-6 одинаковы для всех вариантов БПЛА. Дифференциация происходит только на этапе окраски. Значит:<br>
      • Собираем <strong>общие полуфабрикаты</strong> под прогноз (Оп 1-6, ~425с, 1 SKU)<br>
      • При поступлении заказа — <strong>быстро завершаем</strong> под конкретный вариант (Оп 7-8, ~90с)<br>
      • Запасы в 3× меньше, чем если бы хранили готовые варианты</div>`;
    S.scores.imp2 = Math.max(S.scores.imp2, 90);
    setTimeout(()=>{ const btn=document.getElementById('btnImp2Go'); if(btn) btn.style.display='inline-flex'; },500);
  } else if(ep >= 5){
    result.innerHTML = `<div class="insight-box yellow">⚠️ Неплохо, но можно лучше. Операции ${OPS.find(o=>o.id===ep)?.name} и далее уже включают дифференциацию? Операция 7 (Окраска) — <em>первая</em> точка различия вариантов.</div>`;
  } else if(ep && ep < 5){
    result.innerHTML = `<div class="insight-box red">❌ CODP слишком ранний. Придётся хранить много незавершённого производства по каждому варианту отдельно. Подумай: какая операция первой создаёт различие между Герань-1, 2 и 3?</div>`;
  }
}

function showToast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `lf-toast ${type} show`;
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 3500);
}

function spawnConfetti(){
  const colors=['#1a6b3c','#f5a623','#2196f3','#e91e63','#4caf50','#ff9800'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;top:-10px;left:${Math.random()*100}vw;
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation:confettiFall ${1.5+Math.random()*2}s ${Math.random()*.8}s ease-in forwards;
      z-index:9999;pointer-events:none`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

};

// Which part ids are "lost" in Round 1 (bad 5S → +2s search per click)
const LOST_R1 = new Set([1, 3, 5, 7]);

const ASM = {
  round:1, placed:[], searching:new Set(),
  done:0, timerLeft:0, timerMax:120,
  interval:null, goalReached:false,
  demand:10, fiveS:false,
  variant:null, variantReady:false,
};

function launchAssemblyGame(round){
  const cfg = ROUND_ASM[round];
  clearInterval(ASM.interval);
  Object.assign(ASM, {
    round, placed:[], searching:new Set(),
    done:0, timerLeft:cfg.timerMax, timerMax:cfg.timerMax,
    interval:null, goalReached:false,
    demand:cfg.demand, fiveS:cfg.fiveS,
    variant:null, variantReady:!cfg.variants,
  });
  document.getElementById('app').innerHTML = buildAsmUI(round, cfg);
  highlightAsmNext();
  ASM.interval = setInterval(asmTick, 1000);
}

function buildAsmUI(round, cfg){
  const tag = round===1?'tag-red':round===2?'tag-yellow':'tag-green';
  return `<div class="anim-slide">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div>
        <div class="tag-pill ${tag}" style="margin-bottom:6px">🎮 ${cfg.title}</div>
        <div style="font-size:13px;color:var(--muted)">${cfg.hint}</div>
      </div>
      <button class="btn btn-outline" style="font-size:13px;padding:8px 16px" onclick="exitAsmGame()">✕ Выйти → симуляция</button>
    </div>

    <!-- Timer & demand -->
    <div class="asm-timer-row">
      <div>
        <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:2px">ВРЕМЯ</div>
        <div class="asm-clock" id="asmClock">120</div>
      </div>
      <div class="asm-timer-bar"><div class="asm-timer-fill" id="asmFill" style="width:100%"></div></div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:2px">СОБРАНО / ПЛАН</div>
        <div class="asm-demand-badge"><span id="asmDoneNum">0</span> / ${cfg.demand}</div>
      </div>
    </div>

    ${cfg.variants?`<div style="padding:12px 16px;background:var(--yl);border:1px solid #ffe082;border-radius:10px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">🎨 Выбери вариант БПЛА (нужно перед каждым БПЛА):</div>
      <div class="variant-picker" id="varPicker">
        ${VARIANTS.map(v=>`<button class="var-pick-btn" onclick="pickVariant('${v.emoji}',this)">${v.emoji} ${v.name} · ${v.range}</button>`).join('')}
      </div>
    </div>`:''}

    <div class="asm-wrap">
      <!-- Parts shelf -->
      <div class="asm-parts">
        <div class="asm-parts-title">📦 Склад деталей</div>
        <div id="asmPartsList">${OPS.map(op=>buildAsmPart(op,cfg.fiveS)).join('')}</div>
      </div>

      <!-- Assembly bench -->
      <div class="asm-bench">
        <div class="asm-bench-label">🔧 Сборочный стол</div>
        <div class="asm-drone-preview" id="asmPreview">📦</div>
        <div class="asm-hint" id="asmHint">← Нажми на Корпус чтобы начать</div>
        <div class="asm-slots" id="asmSlots">
          ${OPS.map((op,i)=>`<div class="asm-slot ${i===0?'next-slot':''}" id="asmsl${op.id}" title="${op.name}">
            ${i===0?`<span>${op.icon}</span>`:`<span style="color:#ddd;font-size:14px">·</span>`}
          </div>`).join('')}
        </div>
        <div style="font-size:11px;color:#aaa;margin-top:4px">Клик на деталь → попадает в следующий слот</div>
      </div>

      <!-- Done pile -->
      <div class="asm-done-panel">
        <div class="asm-parts-title">✅ Готово</div>
        <div class="asm-done-big" id="asmDoneBig">0</div>
        <div class="asm-done-label">из ${cfg.demand}</div>
        <div class="asm-done-units" id="asmDoneUnits"></div>
        <div style="margin-top:10px;font-size:12px;text-align:center;color:var(--muted)" id="asmStatus">Осталось: ${cfg.demand}</div>
      </div>
    </div>

    <div id="asmResult"></div>
  </div>`;
}

function buildAsmPart(op, fiveS){
  const lost = !fiveS && LOST_R1.has(op.id);
  return `<div class="asm-part ${lost?'locked':''}" id="apart${op.id}" onclick="clickPart(${op.id})">
    <span class="ap-icon">${op.icon}</span>
    <span style="flex:1">${op.name}</span>
    ${lost?`<span class="ap-badge">🔍</span>`:`<span class="ap-badge" style="color:#ccc">·</span>`}
  </div>`;
}

function clickPart(opId){
  if(ASM.goalReached) return;
  if(!ASM.variantReady){
    showToast('Сначала выбери вариант БПЛА вверху!','warn'); return;
  }
  const expected = ASM.placed.length + 1;
  if(opId !== expected){
    showToast(`Нужна деталь #${expected}: ${OPS[expected-1]?.icon} ${OPS[expected-1]?.name}`,'warn');
    const el=document.getElementById('apart'+opId);
    if(el){el.style.border='2px solid var(--red)';setTimeout(()=>el&&(el.style.border=''),400);}
    return;
  }
  const el = document.getElementById('apart'+opId);
  if(!el||el.classList.contains('placed')||el.classList.contains('searching')) return;

  if(el.classList.contains('locked')){
    // 5S penalty: 2-second search
    el.classList.remove('locked');
    el.classList.add('searching');
    el.querySelector('.ap-badge').textContent='⏳';
    ASM.searching.add(opId);
    showToast(`🔍 Ищем деталь... 2 секунды потеряно (плохой 5S!)`, 'warn');
    setTimeout(()=>{
      ASM.searching.delete(opId);
      const e=document.getElementById('apart'+opId);
      if(e){e.classList.remove('searching','locked');e.querySelector('.ap-badge').textContent='✓';}
      highlightAsmNext();
    }, 2000);
    return;
  }

  placePart(opId);
}

function placePart(opId){
  const op = OPS.find(o=>o.id===opId);
  ASM.placed.push(opId);

  // Mark part as placed
  const el = document.getElementById('apart'+opId);
  if(el){el.classList.add('placed');el.classList.remove('next-part');}

  // Fill slot
  const slot = document.getElementById('asmsl'+opId);
  if(slot){slot.className='asm-slot filled';slot.innerHTML=`<span>${op.icon}</span>`;}

  // Highlight next slot
  const nextOp = OPS[ASM.placed.length];
  if(nextOp){
    const ns=document.getElementById('asmsl'+nextOp.id);
    if(ns){ns.className='asm-slot next-slot';ns.innerHTML=`<span>${nextOp.icon}</span>`;}
  }

  // Update preview emoji based on progress
  const pct = ASM.placed.length / OPS.length;
  const prev = document.getElementById('asmPreview');
  if(prev) prev.textContent = pct<.25?'📦':pct<.5?'⚙️':pct<.75?'✈️':'🚁';

  // Update hint
  const hint = document.getElementById('asmHint');
  if(hint){
    if(ASM.placed.length < OPS.length){
      const n=OPS[ASM.placed.length];
      hint.textContent=`→ Следующая: ${n.icon} ${n.name}`;
    } else {
      hint.textContent='🎉 Готово! Отправляем на склад...';
    }
  }

  highlightAsmNext();
  if(ASM.placed.length === OPS.length) setTimeout(finishDrone, 350);
}

function finishDrone(){
  ASM.done++;
  const emoji = ASM.variant || '🚁';

  // Big number + units
  const db=document.getElementById('asmDoneBig');
  const dn=document.getElementById('asmDoneNum');
  const du=document.getElementById('asmDoneUnits');
  if(db){db.textContent=ASM.done;db.style.animation='popIn .3s';setTimeout(()=>db.style.animation='',300);}
  if(dn) dn.textContent=ASM.done;
  if(du) du.innerHTML+=`<div class="asm-done-unit">${emoji}</div>`;

  // Preview bounce
  const prev=document.getElementById('asmPreview');
  if(prev){prev.style.animation='bounceDrone .5s ease';setTimeout(()=>prev.style.animation='',500);}

  // Status
  const rem = ASM.demand - ASM.done;
  const st=document.getElementById('asmStatus');
  if(st){
    if(rem>0){st.textContent=`Осталось: ${rem} ед.`;st.style.color='var(--muted)';}
    else{st.textContent='🎯 ПЛАН ВЫПОЛНЕН!';st.style.color='var(--g)';}
  }

  showToast(`✅ БПЛА #${ASM.done} ${emoji} готов!`,'ok');

  // Check goal
  if(ASM.done >= ASM.demand && !ASM.goalReached){
    ASM.goalReached = true;
    clearInterval(ASM.interval);
    spawnConfetti();
    setTimeout(showGoalBonus, 400);
    return;
  }

  setTimeout(resetAsmBench, 400);
}

function resetAsmBench(){
  ASM.placed = [];
  const cfg = ROUND_ASM[ASM.round];
  if(cfg.variants){
    ASM.variantReady = false;
    ASM.variant = null;
    document.querySelectorAll('.var-pick-btn').forEach(b=>b.classList.remove('selected'));
  }
  // Reset parts
  OPS.forEach(op=>{
    const el=document.getElementById('apart'+op.id);
    if(el){
      const lost=!cfg.fiveS&&LOST_R1.has(op.id);
      el.className=`asm-part ${lost?'locked':''}`;
      el.querySelector('.ap-badge').textContent=lost?'🔍':'·';
    }
  });
  // Reset slots
  OPS.forEach((op,i)=>{
    const slot=document.getElementById('asmsl'+op.id);
    if(slot){
      slot.className=`asm-slot ${i===0?'next-slot':''}`;
      slot.innerHTML=i===0?`<span>${op.icon}</span>`:`<span style="color:#ddd;font-size:14px">·</span>`;
    }
  });
  // Reset preview
  const prev=document.getElementById('asmPreview');
  if(prev) prev.textContent='📦';
  const hint=document.getElementById('asmHint');
  if(hint) hint.textContent=cfg.variants?'← Выбери вариант выше, затем нажми Корпус':'← Нажми на Корпус чтобы начать';
  highlightAsmNext();
}

function pickVariant(emoji, btn){
  ASM.variant = emoji;
  ASM.variantReady = true;
  document.querySelectorAll('.var-pick-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  showToast(`Вариант ${emoji} выбран — собираем!`,'ok');
  highlightAsmNext();
}

function highlightAsmNext(){
  const nextId = ASM.placed.length + 1;
  OPS.forEach(op=>{
    const el=document.getElementById('apart'+op.id);
    if(!el||el.classList.contains('placed')||el.classList.contains('searching')) return;
    if(op.id===nextId && ASM.variantReady) el.classList.add('next-part');
    else el.classList.remove('next-part');
  });
}

function asmTick(){
  ASM.timerLeft--;
  const cl=document.getElementById('asmClock');
  const fl=document.getElementById('asmFill');
  if(cl){
    cl.textContent=ASM.timerLeft;
    cl.className=`asm-clock ${ASM.timerLeft<20?'danger':ASM.timerLeft<40?'warn':''}`;
  }
  if(fl){
    const pct=ASM.timerLeft/ASM.timerMax*100;
    fl.style.width=pct+'%';
    fl.className=`asm-timer-fill ${pct<17?'danger':pct<33?'warn':''}`;
  }
  if(ASM.timerLeft<=0){ clearInterval(ASM.interval); endAsmGame(); }
}

function showGoalBonus(){
  const el=document.getElementById('asmResult');
  if(!el) return;
  const elapsed = ASM.timerMax - ASM.timerLeft;
  el.innerHTML=`<div class="asm-bonus-banner">
    <div style="font-size:60px;margin-bottom:8px">🏆</div>
    <h2>ПЛАН ВЫПОЛНЕН — ЦЕЛЬ ДОСТИГНУТА!</h2>
    <div style="font-size:15px;opacity:.9;margin-bottom:6px">Собрано <strong>${ASM.done}</strong> из <strong>${ASM.demand}</strong> БПЛА за ${elapsed} секунд</div>
    <div style="font-size:13px;opacity:.8;margin-bottom:20px">💡 Lean-инструменты работают: поток налажен, план выполнен!</div>
    <button onclick="exitAsmGame()" style="background:#fff;color:var(--g);border:none;padding:12px 28px;font-size:15px;font-weight:800;border-radius:10px;cursor:pointer">Продолжить → результаты</button>
  </div>`;
  el.scrollIntoView({behavior:'smooth'});
}

function endAsmGame(){
  const cfg = ROUND_ASM[ASM.round];
  const met = ASM.done >= cfg.demand;
  const pct = Math.round(ASM.done/cfg.demand*100);
  const el=document.getElementById('asmResult');
  if(!el) return;
  if(met){ showGoalBonus(); return; }
  const msgs={
    1:`Плохой 5S украл твоё время — поиск деталей добавил ${LOST_R1.size * 2 * ASM.done}+ сек потерь!`,
    2:`5S помог, но без балансировки линии всё ещё не хватает мощности.`,
    3:`Pull + CODP дают результат. Попробуй ещё — с практикой легче!`,
  };
  el.innerHTML=`<div class="asm-timeout-banner">
    <div style="font-size:48px;margin-bottom:8px">⏰</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:8px">Время вышло!</div>
    <div style="font-size:28px;font-weight:800;color:${pct>=80?'var(--g)':pct>=50?'var(--yellow)':'var(--red)'};margin-bottom:8px">${ASM.done}/${cfg.demand} ед. (${pct}%)</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:20px">${msgs[ASM.round]}</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button onclick="launchAssemblyGame(${ASM.round})" class="btn btn-g">🔄 Попробовать ещё раз</button>
      <button onclick="exitAsmGame()" class="btn btn-outline">Продолжить →</button>
    </div>
  </div>`;
  el.scrollIntoView({behavior:'smooth'});
  if(pct>=60) spawnConfetti();
}

function exitAsmGame(){
  clearInterval(ASM.interval);
  // Sync interactive result to scores
  const r=ASM.round;
  const sc=Math.round(ASM.done/ASM.demand*100);
  if(r===1) S.scores.r1=Math.max(S.scores.r1,sc);
  if(r===2) S.scores.r2=Math.max(S.scores.r2,sc);
  if(r===3) S.scores.r3=Math.max(S.scores.r3,sc);
  const next={1:'imp1',2:'imp2',3:'final'};
  goPhase(next[r]||'final');
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
