<script>
const MODULES = [
  {
    id:1, title:'Основы Lean', lessons:[
      {
        id:'1-1', title:'История TPS и рождение Lean', dur:40,
        mod:'Основы Lean',
        sub:'Как Toyota изобрела производственную систему, ставшую стандартом мирового производства',
        theory:[
          {h:'Рождение Toyota Production System',
           p:`В 1930-х годах Сакити Тойода изобрёл ткацкий станок, который автоматически останавливался при обрыве нити. Этот принцип — <strong>автоматическая остановка при обнаружении дефекта</strong> — лёг в основу концепции Jidoka, одного из двух столпов TPS.<br><br>После Второй мировой войны Эйджи Тойода и Тайити Оно посетили заводы Ford в США. Они увидели мощное массовое производство, но поняли: Toyota не может скопировать Ford — у Японии не было ресурсов для огромных партий и запасов. Нужен был другой путь.`},
          {h:'Тайити Оно и TPS',
           p:`Тайити Оно разработал Toyota Production System, сфокусировавшись на двух целях: <strong>устранение потерь</strong> и <strong>уважение к людям</strong>. Он ввёл систему вытягивания (Pull), канбан-карточки и концепцию Just-in-Time — производить только то, что нужно, когда нужно, в нужном количестве.<br><br>Второй столп TPS — <strong>Jidoka</strong> (дзидока): умная автоматизация с человеческим интеллектом. Оборудование само обнаруживает проблему и останавливается, не порождая дефектов дальше по потоку.`},
          {h:'Рождение термина «Lean»',
           p:`В 1990 году вышла книга Джеймса Вомака, Дэниела Джонса и Дэниела Руса <em>«Машина, которая изменила мир»</em> — результат 5-летнего исследования MIT. Они сравнили заводы Toyota и западных производителей и ввели термин <strong>Lean Manufacturing</strong> («бережливое производство»).<br><br>В 1996 году Вомак и Джонс выпустили <em>«Lean Thinking»</em> — книгу с пятью универсальными принципами Lean, применимыми в любой отрасли.`},
          {h:'Lean сегодня',
           p:`Сегодня Lean используется не только в производстве, но и в здравоохранении, строительстве, IT (Agile/Scrum — прямые потомки Lean), банках и госсекторе. Принципы TPS стали фундаментом стандартов ISO и основой обучения в ведущих бизнес-школах мира.`}
        ],
        terms:[
          {t:'TPS',d:'Toyota Production System — производственная система Toyota, основа современного Lean'},
          {t:'JIT',d:'Just-in-Time — производить только нужное, когда нужно, в нужном количестве'},
          {t:'Jidoka',d:'Автоматизация с человеческим интеллектом: автостоп оборудования при обнаружении дефекта'},
          {t:'Lean',d:'«Бережливое производство» — термин введён Вомаком в 1990 году для описания принципов TPS'},
        ],
        task:'Найдите в своей организации один процесс, который кажется вам «тяжёлым» или медленным. Запишите 2-3 причины, почему он работает именно так. Подумайте: была ли когда-нибудь попытка его улучшить?',
        quiz:[
          {q:'Кто разработал Toyota Production System?',opts:['Сакити Тойода','Эйджи Тойода','Тайити Оно','Джеймс Вомак'],ans:2},
          {q:'Что означает принцип Jidoka?',opts:['Производить без запасов','Автоматическая остановка при дефекте','Быстрая переналадка','Картирование потока'],ans:1},
          {q:'В каком году появился термин «Lean Manufacturing»?',opts:['1950','1975','1990','2000'],ans:2},
        ]
      },
      {
        id:'1-2', title:'8 видов потерь — Muda', dur:50,
        mod:'Основы Lean',
        sub:'Научитесь видеть потери — первый шаг к бережливому производству',
        theory:[
          {h:'Три вида потерь: Muda, Mura, Muri',
           p:`В Lean выделяют три вида потерь. <strong>Muda</strong> (無駄) — любые действия, не добавляющие ценности. <strong>Mura</strong> (斑) — неравномерность: то перегрузка, то простой. <strong>Muri</strong> (無理) — перегрузка людей и оборудования сверх разумных возможностей.<br><br>Часто работают со всеми тремя одновременно: неравномерный спрос (Mura) порождает перегрузку в пиках (Muri), что приводит к дефектам (Muda).`},
          {h:'8 видов потерь Muda', html:`<div class="wgrid">
            <div class="wcard"><div class="wcard__n">Потеря 1</div><div class="wcard__name">Перепроизводство</div><div class="wcard__desc">Производство больше, чем нужно клиенту прямо сейчас</div><div class="wcard__ex">Пример: штамповка 1 000 деталей при потребности 200</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 2</div><div class="wcard__name">Ожидание</div><div class="wcard__desc">Простой людей или оборудования в ожидании следующего шага</div><div class="wcard__ex">Пример: оператор ждёт пока станок закончит цикл</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 3</div><div class="wcard__name">Транспортировка</div><div class="wcard__desc">Лишние перемещения материалов и деталей</div><div class="wcard__ex">Пример: склад сырья в 200 м от линии производства</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 4</div><div class="wcard__name">Излишняя обработка</div><div class="wcard__desc">Операции, за которые клиент не готов платить</div><div class="wcard__ex">Пример: полировка поверхности, которую никто не видит</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 5</div><div class="wcard__name">Запасы</div><div class="wcard__desc">Избыточные запасы сырья, НЗП и готовой продукции</div><div class="wcard__ex">Пример: склад готовой продукции на 3 месяца вперёд</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 6</div><div class="wcard__name">Лишние движения</div><div class="wcard__desc">Нерациональные движения оператора на рабочем месте</div><div class="wcard__ex">Пример: поиск инструмента в захламлённом ящике</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 7</div><div class="wcard__name">Дефекты</div><div class="wcard__desc">Переделка, брак, инспекция, гарантийные ремонты</div><div class="wcard__ex">Пример: 3% деталей идёт на переработку из-за брака</div></div>
            <div class="wcard"><div class="wcard__n">Потеря 8</div><div class="wcard__name">Нереализованный потенциал</div><div class="wcard__desc">Неиспользованные знания, идеи и таланты сотрудников</div><div class="wcard__ex">Пример: рабочие знают решение, но их не спрашивают</div></div>

// ===================== STATE =====================
let prog = JSON.parse(localStorage.getItem('li-lean-intro') || '{}');
let cur = {m:0, l:0};
let quizState = {};

// ===================== HELPERS =====================
function allLessons(){
  const arr = [];
  MODULES.forEach((m,mi)=>m.lessons.forEach((l,li)=>arr.push({m:mi,l:li,id:l.id})));
  return arr;
}
function totalDone(){return Object.keys(prog).filter(k=>prog[k]).length;}
function updateProgress(){
  const done = totalDone(), total = allLessons().length;
  document.getElementById('progText').textContent = done+' / '+total;
  document.getElementById('progFill').style.width = Math.round(done/total*100)+'%';
}

// ===================== SIDEBAR =====================
function buildSidebar(){
  const tree = document.getElementById('sidebarTree');
  tree.innerHTML = '';
  MODULES.forEach((m,mi)=>{
    const expanded = m.lessons.some((_,li)=>cur.m===mi);
    const mod = document.createElement('div');
    mod.className = 'sidebar-module'+(expanded?' expanded':'');
    const doneCount = m.lessons.filter(l=>prog[l.id]).length;
    mod.innerHTML = `<div class="sidebar-module__head" onclick="toggleMod(this)">
      <span>${m.id}. ${m.title}</span>
      <span class="sidebar-module__count">${doneCount}/${m.lessons.length}</span>
    </div>
    <div class="sidebar-module__lessons">${m.lessons.map((l,li)=>`
      <div class="sidebar-lesson${cur.m===mi&&cur.l===li?' active':''}${prog[l.id]?' done':''}"
           onclick="openLesson(${mi},${li})">
        <div class="sl-check">${prog[l.id]?'✓':''}</div>
        <div class="sl-info">
          <span class="sl-title">${l.title}</span>
          <span class="sl-dur">${l.dur} мин</span>
        </div>
      </div>`).join('')}
    </div>`;
    tree.appendChild(mod);
  });
}
function toggleMod(el){el.parentElement.classList.toggle('expanded');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

// ===================== LESSON RENDER =====================
function openLesson(mi, li){
  cur = {m:mi, l:li};
  document.getElementById('sidebar').classList.remove('open');
  buildSidebar();
  const lesson = MODULES[mi].lessons[li];
  if(lesson.isFinal){renderFinalTest(lesson); return;}
  renderLesson(mi, li, lesson);
  updateProgress();
}

function renderLesson(mi, li, L){
  const all = allLessons();
  const idx = all.findIndex(x=>x.m===mi&&x.l===li);
  const hasPrev = idx>0, hasNext = idx<all.length-1;

  let theoryHtml = '';
  (L.theory||[]).forEach(sec=>{
    theoryHtml += '<div class="ts">';
    if(sec.h) theoryHtml += `<h3>${sec.h}</h3>`;
    if(sec.p) theoryHtml += `<p>${sec.p}</p>`;
    if(sec.html) theoryHtml += sec.html;
    theoryHtml += '</div>';
  });

  let termsHtml = '';
  if(L.terms&&L.terms.length){
    termsHtml = `<div class="key-terms"><h3>🔑 Ключевые термины</h3><div class="term-list">
      ${L.terms.map(t=>`<div class="term-item"><span class="term-item__b">${t.t}</span><span class="term-item__d">${t.d}</span></div>`).join('')}
    </div></div>`;
  }

  let taskHtml = '';
  if(L.task){
    taskHtml = `<div class="task-box"><div class="task-box__label">✏️ Практическое задание</div>
      <h3>Применить в жизни</h3><p>${L.task}</p></div>`;
  }

  let quizHtml = '';
  if(L.quiz&&L.quiz.length){
    quizHtml = `<div class="quiz-sec"><h3>🧠 Мини-тест</h3>
      <p class="quiz-sec__sub">Проверьте понимание — 3 вопроса</p>
      ${L.quiz.map((q,qi)=>`
        <div class="qitem" id="qi-${L.id}-${qi}">
          <div class="qitem__n">Вопрос ${qi+1} из ${L.quiz.length}</div>
          <div class="qitem__q">${q.q}</div>
          <div class="qopts">${q.opts.map((o,oi)=>`
            <button class="qopt" onclick="answerQ('${L.id}',${qi},${oi},${q.ans})">${o}</button>
          `).join('')}</div>
          <div id="qfb-${L.id}-${qi}"></div>
        </div>`).join('')}
      <div class="quiz-result" id="qres-${L.id}">
        <div class="quiz-result__score" id="qscore-${L.id}">0/3</div>
        <div class="quiz-result__text">Урок можно завершить!</div>
      </div>
    </div>`;
  }

  const navBtns = `<div class="lesson-nav">
    ${hasPrev?`<button class="lnbtn lnbtn--prev" onclick="openLesson(${all[idx-1].m},${all[idx-1].l})">← Предыдущий</button>`:'<span></span>'}
    <button class="lnbtn lnbtn--complete" onclick="completeLesson('${L.id}',${mi},${li},'${hasNext}',${hasNext?all[idx+1].m:0},${hasNext?all[idx+1].l:0})">✓ Завершить урок</button>
    ${hasNext?`<button class="lnbtn lnbtn--next" onclick="openLesson(${all[idx+1].m},${all[idx+1].l})">Следующий →</button>`:''}
  </div>`;

  document.getElementById('lessonArea').innerHTML = `
    <div class="lesson-header">
      <div class="lesson-header__meta">
        <span class="lbadge lbadge--mod">${L.mod}</span>
        <span class="lbadge lbadge--dur">⏱ ${L.dur} мин</span>
        ${prog[L.id]?'<span class="lbadge" style="background:#e8f5e9;color:#1a6b3c">✓ Пройдено</span>':''}
      </div>
      <div class="lesson-header__title">${L.title}</div>
      <div class="lesson-header__sub">${L.sub}</div>
    </div>
    <div class="lesson-video">
      <div class="lesson-video__ph">
        <div class="lesson-video__icon">🎬</div>
        <div class="lesson-video__title">${L.title}</div>
        <div class="lesson-video__label">Видео доступно после приобретения курса</div>
      </div>
    </div>
    ${theoryHtml}
    ${termsHtml}
    ${taskHtml}
    ${quizHtml}
    ${navBtns}
  `;
  document.getElementById('lessonArea').scrollIntoView({behavior:'smooth',block:'start'});
  if(document.querySelector('.cp-main')) document.querySelector('.cp-main').scrollTop = 0;
}

function answerQ(lid, qi, chosen, correct){
  const container = document.getElementById('qi-'+lid+'-'+qi);
  if(!container) return;
  const opts = container.querySelectorAll('.qopt');
  opts.forEach(o=>o.classList.add('disabled'));
  opts[chosen].classList.add(chosen===correct?'correct':'wrong');
  if(chosen!==correct) opts[correct].classList.add('correct');
  const fb = document.getElementById('qfb-'+lid+'-'+qi);
  if(fb) fb.innerHTML = `<div class="qfb ${chosen===correct?'ok':'fail'}">${chosen===correct?'✓ Правильно!':'✗ Неправильно. Правильный ответ: '+MODULES.flatMap(m=>m.lessons).find(l=>l.id===lid)?.quiz[qi]?.opts[correct]}</div>`;

  if(!quizState[lid]) quizState[lid]={answers:{}};
  quizState[lid].answers[qi] = chosen===correct;
  const L = MODULES.flatMap(m=>m.lessons).find(l=>l.id===lid);
  if(L&&L.quiz){
    const done = Object.keys(quizState[lid].answers).length;
    if(done===L.quiz.length){
      const score = Object.values(quizState[lid].answers).filter(Boolean).length;
      const res = document.getElementById('qres-'+lid);
      if(res){res.style.display='block'; document.getElementById('qscore-'+lid).textContent=score+'/'+L.quiz.length;}
    }
  }
}

function completeLesson(lid, mi, li, hasNext, nm, nl){
  prog[lid] = true;
  localStorage.setItem('li-lean-intro', JSON.stringify(prog));
  updateProgress();
  buildSidebar();
  if(hasNext==='true'||hasNext===true) openLesson(nm, nl);
}

// ===================== FINAL TEST =====================
let finalAnswers = {};
function renderFinalTest(L){
  finalAnswers = {};
  const qs = L.finalQuiz.map((q,qi)=>`
    <div class="qitem" id="fq-${qi}" style="margin-bottom:22px">
      <div class="qitem__n">Вопрос ${qi+1} из ${L.finalQuiz.length}</div>
      <div class="qitem__q">${q.q}</div>
      <div class="qopts">${q.opts.map((o,oi)=>`
        <button class="qopt" id="fqo-${qi}-${oi}" onclick="selectFinal(${qi},${oi},${q.ans},${q.opts.length})">${o}</button>
      `).join('')}</div>
      <div id="ffb-${qi}"></div>
    </div>`).join('');

  document.getElementById('lessonArea').innerHTML = `
    <div class="lesson-header">
      <div class="lesson-header__meta"><span class="lbadge lbadge--mod">Итоговый блок</span><span class="lbadge lbadge--dur">⏱ 30 мин</span></div>
      <div class="lesson-header__title">Итоговый тест</div>
      <div class="lesson-header__sub">20 вопросов по всему курсу. Для получения сертификата нужно набрать 70%+</div>
    </div>
    <div class="quiz-sec">
      <h3>📋 Итоговый тест</h3>
      <p class="quiz-sec__sub">Ответьте на все 20 вопросов и нажмите «Завершить тест»</p>
      ${qs}
      <div style="text-align:center;margin-top:24px">
        <button class="lnbtn lnbtn--next" style="padding:14px 32px;font-size:16px" onclick="submitFinal()">Завершить тест →</button>
      </div>
    </div>`;
  if(document.querySelector('.cp-main')) document.querySelector('.cp-main').scrollTop = 0;
}

function selectFinal(qi, oi, correct, numOpts){
  for(let i=0;i<numOpts;i++){
    const b = document.getElementById('fqo-'+qi+'-'+i);
    if(b){b.classList.remove('correct','wrong'); b.classList.add('disabled');}
  }
  const chosen = document.getElementById('fqo-'+qi+'-'+oi);
  if(chosen) chosen.classList.add(oi===correct?'correct':'wrong');
  if(oi!==correct){const c=document.getElementById('fqo-'+qi+'-'+correct); if(c) c.classList.add('correct');}
  finalAnswers[qi] = oi===correct;
}

function submitFinal(){
  const total = MODULES[3].lessons[1].finalQuiz.length;
  const answered = Object.keys(finalAnswers).length;
  if(answered < total){
    alert(`Ответьте на все вопросы. Отвечено: ${answered} из ${total}.`);
    return;
  }
  const score = Object.values(finalAnswers).filter(Boolean).length;
  const pct = Math.round(score/total*100);
  const pass = pct>=70;
  const lid = '4-2';
  if(pass){prog[lid]=true; localStorage.setItem('li-lean-intro',JSON.stringify(prog)); updateProgress(); buildSidebar();}
  const now = new Date();
  const dateStr = now.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});

  document.getElementById('lessonArea').innerHTML = `
    <div class="cert-wrap">
      ${pass ? `
        <div class="cert-card">
          <div class="cert-title">Сертификат об окончании курса</div>
          <div class="cert-main">Введение в Lean Manufacturing</div>
          <div class="cert-course">LeanPro — Профессиональное образование</div>
          <div class="cert-seal">🏆</div>
          <div class="cert-org">⬡ LeanPro</div>
          <div class="cert-score">Результат теста: ${score}/${total} (${pct}%)</div>
          <div class="cert-date">Выдан: ${dateStr}</div>
          <button class="cert-btn" onclick="window.print()">🖨️ Распечатать сертификат</button>
        </div>
        <p style="margin-top:24px;color:#6b7280;font-size:14px">Поздравляем! Вы успешно завершили курс «Введение в Lean».<br>Оригинальный сертификат государственного образца будет отправлен на вашу почту.</p>
      ` : `
        <div style="font-size:64px;margin-bottom:16px">📉</div>
        <h2 style="font-size:24px;font-weight:800;margin-bottom:8px">Результат: ${score}/${total} (${pct}%)</h2>
        <p style="color:#6b7280;margin-bottom:24px">Для получения сертификата необходимо набрать 70% и выше.<br>Повторите материал и попробуйте снова.</p>
        <button class="lnbtn lnbtn--next" style="padding:12px 28px" onclick="openLesson(3,1)">Пройти тест ещё раз</button>
      `}
    </div>`;
  document.querySelector('.cp-main').scrollTop = 0;
}

// ===================== BOOT =====================
buildSidebar();
updateProgress();
</script>
